name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ แก้ warning Node 20

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5            # ✅ v5

      - uses: actions/setup-node@v5          # ✅ v5
        with:
          node-version: '22'
          cache: 'npm'                       # ✅ cache เพื่อความเร็ว

      - run: npm install                     # ✅ ใช้ install ถ้ายังไม่มี lock file
      - run: npm run build
