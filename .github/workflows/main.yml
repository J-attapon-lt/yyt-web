name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          # ❌ ไม่ใส่ cache: 'npm' จนกว่าจะมี package-lock.json

      - run: npm install
      - run: npm run build
