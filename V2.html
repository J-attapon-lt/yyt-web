/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   DESIGN TOKENS
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
:root {
  --ink:       #050810;
  --deep:      #080c1a;
  --navy:      #0c1428;
  --navy-mid:  #101c38;
  --navy-lite: #162040;

  --gold:      #c8953e;
  --gold-lt:   #e8b96a;
  --gold-dim:  rgba(200,149,62,0.15);
  --gold-glow: rgba(200,149,62,0.35);

  --blue-glow: rgba(56,132,255,0.2);
  --blue-acc:  #3884ff;

  --white:     #ffffff;
  --white-70:  rgba(255,255,255,0.7);
  --white-40:  rgba(255,255,255,0.4);
  --white-15:  rgba(255,255,255,0.15);
  --white-08:  rgba(255,255,255,0.08);
  --white-04:  rgba(255,255,255,0.04);

  --glass-bg:   rgba(255,255,255,0.05);
  --glass-bdr:  rgba(255,255,255,0.12);
  --glass-gold: rgba(200,149,62,0.12);

  --ff-head: 'Playfair Display', Georgia, serif;
  --ff-body: 'Prompt', sans-serif;
  --ff-mono: 'Space Grotesk', sans-serif;

  --ease: cubic-bezier(0.25,0.46,0.45,0.94);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
}

/* \u2500\u2500\u2500 RESET \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--ff-body);
  background:var(--ink);
  color:var(--white);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* \u2500\u2500\u2500 GRAIN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:.4;
}

/* \u2500\u2500\u2500 SCROLLBAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--ink);}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--gold),var(--blue-acc));border-radius:2px;}
::selection{background:var(--gold);color:var(--ink);}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   ANIMATIONS
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
@keyframes fadeUp    {from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn    {from{opacity:0;}to{opacity:1;}}
@keyframes slideLeft {from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 20px var(--gold-glow);}50%{box-shadow:0 0 50px var(--gold-glow),0 0 80px rgba(200,149,62,0.15);}}
@keyframes orbit    {from{transform:rotate(0deg) translateX(260px) rotate(0deg);}to{transform:rotate(360deg) translateX(260px) rotate(-360deg);}}
@keyframes orbit2   {from{transform:rotate(180deg) translateX(380px) rotate(-180deg);}to{transform:rotate(540deg) translateX(380px) rotate(-540deg);}}
@keyframes float    {0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes borderGlow{0%,100%{opacity:.4;}50%{opacity:1;}}
@keyframes marquee  {from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes countUp  {from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
@keyframes shimmer  {0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes lineDown {from{height:0;}to{height:60px;}}
@keyframes spin-slow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes badge-in {from{opacity:0;transform:translateY(-16px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}

/* \u2500\u2500\u2500 REVEAL SYSTEM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .85s var(--ease),transform .85s var(--ease);}
.reveal.in{opacity:1;transform:none;}
.reveal-left{opacity:0;transform:translateX(-24px);transition:opacity .85s var(--ease),transform .85s var(--ease);}
.reveal-left.in{opacity:1;transform:none;}
.reveal-scale{opacity:0;transform:scale(.95);transition:opacity .85s var(--ease),transform .85s var(--ease);}
.reveal-scale.in{opacity:1;transform:scale(1);}
.d1{transition-delay:.1s;} .d2{transition-delay:.2s;} .d3{transition-delay:.3s;} .d4{transition-delay:.4s;}

/* \u2500\u2500\u2500 HERO ENTRY ANIMATIONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
.h-a1{opacity:0;animation:fadeUp .9s var(--ease) .2s forwards;}
.h-a2{opacity:0;animation:fadeUp .9s var(--ease) .4s forwards;}
.h-a3{opacity:0;animation:fadeUp .9s var(--ease) .6s forwards;}
.h-a4{opacity:0;animation:fadeUp .9s var(--ease) .8s forwards;}
.h-a5{opacity:0;animation:fadeUp .9s var(--ease) 1.0s forwards;}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550

.top-badge{

  text-align:center;
  position:relative;
  z-index:999;
  animation:badge-in .6s var(--ease) forwards;
  backdrop-filter:blur(12px);
}
